# ════════════════════════════════════════════════════════════════
# GitHub Actions — FM FTP Movie Incremental Crawler
# ════════════════════════════════════════════════════════════════
# প্রতিদিন রাত ১টায় (BD) auto run।
# শুধু নতুন মুভি খোঁজে — পুরনোতে হাত দেয় না।
# নতুন মুভি লিস্টের শুরুতে যোগ হয়।
# ════════════════════════════════════════════════════════════════

name: 🎬 FM FTP Movie Crawler

on:
  schedule:
    - cron: '0 19 * * *'    # রাত ১টা BD time
  workflow_dispatch:
    inputs:
      full_crawl:
        description: 'Full crawl (সব নতুন করে আনো)'
        required: false
        default: 'false'
        type: boolean

jobs:
  crawl:
    name: Incremental Movie Update
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Incremental Crawl ─────────────────────────────────
      - name: 🕷️ Run incremental crawler
        env:
          TMDB_API_TOKEN: ${{ secrets.TMDB_API_TOKEN }}
          TMDB_API_KEY:   ${{ secrets.TMDB_API_KEY }}
        run: |
          echo "▶ Started at $(date)"
          if [ "${{ github.event.inputs.full_crawl }}" = "true" ]; then
            echo "🔄 Full crawl mode"
            python crawl_movies.py --output movies_fmftp.json --full
          else
            echo "⚡ Incremental mode"
            python crawl_movies.py --output movies_fmftp.json
          fi
          echo "✅ Finished at $(date)"

      # ── 4. Stats ─────────────────────────────────────────────
      - name: 📊 Show result
        run: |
          if [ -f movies_fmftp.json ]; then
            TOTAL=$(python3 -c "import json; print(len(json.load(open('movies_fmftp.json'))))")
            SIZE=$(du -sh movies_fmftp.json | cut -f1)
            echo "✅ Total movies : $TOTAL"
            echo "📦 File size    : $SIZE"
            echo "🆕 Latest 3 entries:"
            python3 -c "
          import json
          d = json.load(open('movies_fmftp.json'))
          for m in d[:3]:
              logo = '🖼' if m.get('logo') else '  '
              print(f'  {logo} {m[\"name\"]} [{m[\"description\"]}]')
          "
          else
            echo "❌ movies_fmftp.json not found!"
            exit 1
          fi

      # ── 5. Commit & Push ─────────────────────────────────────
      - name: 📤 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add movies_fmftp.json

          if git diff --staged --quiet; then
            echo "ℹ️ No new movies — skipping commit."
          else
            TOTAL=$(python3 -c "import json; print(len(json.load(open('movies_fmftp.json'))))")
            git commit -m "🎬 +new movies → total ${TOTAL} [$(date '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ Pushed!"
          fi
